<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学生画像</title>
    <link rel="stylesheet" href="./styles.css?v=17" />
  </head>
  <body>
    <aside id="aiDoctorPanel" class="ai-doctor-panel" aria-live="polite">
      <div class="ai-doctor-avatar" aria-hidden="true">
        <div class="ai-doctor-cap"></div>
        <div class="ai-doctor-face">
          <span></span>
          <span></span>
        </div>
      </div>
      <div class="ai-doctor-bubble">
        <div class="ai-doctor-bubble-top">
          <p class="eyebrow">AI Mentor</p>
          <strong>小博士点评中</strong>
        </div>
        <p id="aiDoctorText" class="ai-doctor-text">点击“生成点评”后，小博士会从这里出现，朗读这位学生的点评内容。</p>
      </div>
    </aside>
    <main class="page">
      <section class="panel hero-panel">
        <div class="hero-row">
          <div>
            <p class="eyebrow">Student</p>
            <h1 id="studentTitle">学生详情</h1>
            <p class="subtitle" id="studentSubtitle">正在加载学生画像...</p>
          </div>
          <a class="text-link" id="backToItem" href="./index.html">返回课堂列表</a>
        </div>
      </section>

      <section class="panel">
        <div class="student-meta-grid">
          <article class="student-meta-card">
            <span>班级</span>
            <strong id="studentClass">-</strong>
          </article>
          <article class="student-meta-card">
            <span>性别</span>
            <strong id="studentSex">-</strong>
          </article>
          <article class="student-meta-card">
            <span>教师</span>
            <strong id="studentTeacher">-</strong>
          </article>
        </div>
      </section>

      <aside class="parent-note-panel" aria-labelledby="parentNoteTitle">
        <div class="parent-note-header">
          <div>
            <p class="eyebrow">Parents</p>
            <h2 id="parentNoteTitle">家长赠语</h2>
          </div>
          <span class="parent-note-badge">悬浮卡片</span>
        </div>
        <p class="parent-note-intro">在这里写给孩子一句鼓励、提醒或祝福。内容会按学生单独保存到系统中。</p>
        <label class="parent-note-field" for="parentNoteText">赠语内容</label>
        <textarea
          id="parentNoteText"
          class="parent-note-textarea"
          placeholder="例如：愿你继续保持今天的专注和勇气，把每一次思考都变成成长的小台阶。"
        ></textarea>
        <div class="parent-note-actions">
          <button id="parentNoteSave" class="primary" type="button">保存赠语</button>
          <button id="parentNoteClear" class="ghost" type="button">清空</button>
        </div>
        <div id="parentNoteMessage" class="message parent-note-message"></div>
      </aside>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Progress</p>
            <h2>五维表现图</h2>
          </div>
        </div>
        <div id="studentMessage" class="message"></div>
        <div id="metricList" class="metric-list">
          <div class="status-card">
            <strong>正在准备图表...</strong>
            <p>稍等一下，我们马上把这位同学的画像展示出来。</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">AI Comment</p>
            <h2>AI 点评</h2>
          </div>
          <button id="commentaryButton" class="ghost" type="button">生成点评</button>
        </div>
        <div id="commentaryMessage" class="message"></div>
        <article class="ai-commentary-card">
          <p id="commentaryText">点击右上角按钮后，这里会生成这位学生的课堂点评。</p>
        </article>
      </section>
    </main>

    <script src="./student.js?v=17"></script>
  </body>
</html>
