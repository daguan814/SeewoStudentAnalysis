<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>课堂图片入库</title>
    <link rel="stylesheet" href="./styles.css?v=6" />
  </head>
  <body>
    <main class="page">
      <section class="panel hero-panel">
        <div class="hero-row">
          <div>
            <p class="eyebrow">Heatmap Import</p>
            <h1>课堂图片入库</h1>
            <p class="subtitle">
              上传热力图截图，系统会自动识别每个座位的排、列和分数，再把课堂信息和学生信息一起写入数据库。
            </p>
          </div>
          <a class="text-link" href="./index.html">查看课堂信息</a>
        </div>
      </section>

      <section class="panel">
        <form id="import-form" class="form-grid">
          <label class="field field-wide">
            <span>课堂热力图截图</span>
            <input id="imageFile" type="file" accept=".png,.jpg,.jpeg" required />
          </label>

          <label class="field">
            <span>课堂名</span>
            <input id="itemName" type="text" placeholder="例如：四年级数学" required />
          </label>

          <label class="field">
            <span>授课班级</span>
            <input id="className" type="text" placeholder="4-1" required />
          </label>

          <label class="field">
            <span>授课教师</span>
            <input id="teacher" type="text" placeholder="生菜" required />
          </label>

          <label class="field field-wide tall">
            <span>学生信息（每行一个，格式：姓名 空格/Tab 性别）</span>
            <textarea id="studentLinesText" rows="14" placeholder="祝梦鸽 女&#10;彭可伊 女"></textarea>
          </label>

          <div class="actions field-wide">
            <button type="button" id="previewButton" class="ghost">识别测试</button>
            <button type="submit" class="primary">确认入库</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Preview</p>
            <h2>识别结果</h2>
          </div>
          <div id="summary" class="summary">还没有开始识别</div>
        </div>
        <div id="message" class="message"></div>
        <div class="status-card">
          <strong id="previewStatus">等待识别</strong>
          <p id="previewDetail">点击“识别测试”后，这里会显示识别结果和座位数量。</p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Import</p>
            <h2>入库结果</h2>
          </div>
          <div id="resultSummary" class="summary">还没有入库</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>序号</th>
                <th>姓名</th>
                <th>性别</th>
                <th>排</th>
                <th>列</th>
                <th>总分</th>
                <th>6个细分分数</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <tr>
                <td colspan="7" class="empty">提交成功后，这里会展示入库明细。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./main.js?v=6"></script>
  </body>
</html>
